[build]
builder = "nixpacks"
# Nixpacks already runs `pnpm i --frozen-lockfile` in step 6 with all deps.
# Re-running install here with NODE_ENV=production prunes devDeps (tsx,
# tailwind, postcss, etc.) which breaks `pnpm build`. Just build directly.
buildCommand = "pnpm build"

[deploy]
startCommand = "pnpm run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
